name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build macOS app
    runs-on: macos-26

    env:
      SCHEME: IdasenDesk
      CONFIGURATION: Release
      DERIVED_DATA_PATH: ${{ runner.temp }}/DerivedData

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.5.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
          xcodegen --version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app
        run: |
          xcodebuild \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "platform=macOS" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package app
        run: |
          APP_PATH="$DERIVED_DATA_PATH/Build/Products/$CONFIGURATION/Idasen Desk.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found at $APP_PATH"
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"
          mkdir -p dist
          ditto -c -k --keepParent "$APP_PATH" "dist/IdasenDesk-$VERSION.zip"
          shasum -a 256 "dist/IdasenDesk-$VERSION.zip" > "dist/IdasenDesk-$VERSION.zip.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: IdasenDesk-${{ github.ref_name || github.run_number }}
          path: dist/*

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/* \
            --title "Idasen Desk $GITHUB_REF_NAME" \
            --notes "Release build for Idasen Desk $GITHUB_REF_NAME."
